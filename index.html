<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tengo una pregunta para vos ❤️</title>
  <meta name="description" content="Una página especial hecha con todo el amor del mundo para vos." />

  <!-- Open Graph -->
  <meta property="og:title" content="Tengo una pregunta para vos ❤️" />
  <meta property="og:description" content="Una página especial hecha con todo el amor del mundo para vos." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/images/og-preview.png" />

  <!-- Favicon placeholder -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌼</text></svg>" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============================================================
       SCREEN 1: WELCOME / PREGUNTA
  ============================================================ -->
  <div id="screen-welcome" class="screen" role="main" aria-label="Pantalla de bienvenida">
    <div class="bokeh-layer" aria-hidden="true" id="bokeh-welcome"></div>
    <div class="stars-layer" aria-hidden="true" id="stars-welcome"></div>

    <div class="welcome-content" id="welcome-content">
      <div class="subtitle-intro" id="subtitle-intro" aria-live="polite">
        <span class="heart-pulse">❤️</span>
      </div>
      <h1 class="title-main" id="title-main">
        Tengo una pregunta<br/>para vos
        <span class="title-heart" aria-hidden="true">❤️</span>
      </h1>

      <div class="question-block" id="question-block" aria-hidden="true">
        <p class="question-text">¿Querés ser mi novia?</p>
        <div class="buttons-row" role="group" aria-label="Opciones de respuesta">
          <button id="btn-yes" class="btn btn-yes" aria-label="Sí, quiero ser tu novia">
            Sí ❤️
          </button>
          <button id="btn-no" class="btn btn-no" aria-label="No por ahora">
            No 😅
          </button>
        </div>
        <p class="no-hint" id="no-hint" aria-live="polite"></p>
      </div>
    </div>
  </div>

  <!-- ============================================================
       MODAL: CONFIRMACIÓN "NO"
  ============================================================ -->
  <div id="modal-no" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
    <div class="modal-box">
      <h2 class="modal-title" id="modal-title">¿Estás completamente segura?</h2>
      <p class="modal-text">Preparé todo esto para vos 🌼</p>
      <div class="modal-buttons">
        <button id="modal-confirm-no" class="btn btn-modal-no">Sí, estoy segura</button>
        <button id="modal-maybe-yes" class="btn btn-modal-yes">Bueno... quizás ❤️</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       SCREEN 2: RESPUESTA POSITIVA (transición)
  ============================================================ -->
  <div id="screen-yes" class="screen" aria-hidden="true">
    <div class="bokeh-layer" id="bokeh-yes" aria-hidden="true"></div>
    <canvas id="canvas-petals" aria-hidden="true"></canvas>
    <div class="yes-message" id="yes-message">
      <p class="yes-text" id="yes-text-line"></p>
    </div>
  </div>

  <!-- ============================================================
       SCREEN 3: JARDÍN PRINCIPAL
  ============================================================ -->
  <div id="screen-garden" class="screen" aria-hidden="true">
    <div class="bokeh-layer" id="bokeh-garden" aria-hidden="true"></div>
    <div class="stars-layer" id="stars-garden" aria-hidden="true"></div>
    <canvas id="canvas-garden" aria-label="Jardín de flores animadas"></canvas>
    <canvas id="canvas-particles" aria-hidden="true"></canvas>

    <!-- Mensaje romántico flotante -->
    <div id="romantic-message" class="romantic-message" aria-live="polite" aria-atomic="true"></div>

    <!-- Botón música -->
    <button id="music-btn" class="music-btn" aria-label="Reproducir música de fondo" title="Música">
      <span class="music-icon">🎵</span>
      <span class="music-label">Música</span>
    </button>

    <!-- Audio -->
    <audio id="bg-music" loop preload="none">
      <source src="assets/audio/musica.mp3" type="audio/mpeg" />
    </audio>
  </div>

  <script src="script.js"></script>
</body>
</html>
